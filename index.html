<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WASD — Скоро запуск">
    <title>WASD — Скоро запуск</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
</head>
<body>
    <div class="bg-grid"></div>

    <main class="container">
        <div class="logo">
            <span class="logo-icon">🎮</span>
            <h1>WASD</h1>
        </div>

        <p class="tagline">Сайт в разработке</p>

        <div class="status-card">
            <div class="status-dot"></div>
            <span>Скоро здесь будет кое-что интересное</span>
        </div>

        <div class="countdown" id="countdown">
            <div class="countdown-item">
                <span class="countdown-value" id="days">00</span>
                <span class="countdown-label">Дней</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-value" id="hours">00</span>
                <span class="countdown-label">Часов</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-value" id="minutes">00</span>
                <span class="countdown-label">Минут</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-value" id="seconds">00</span>
                <span class="countdown-label">Секунд</span>
            </div>
        </div>

        <div class="keys">
            <div class="key-row">
                <div class="key" data-key="w">W</div>
            </div>
            <div class="key-row">
                <div class="key" data-key="a">A</div>
                <div class="key" data-key="s">S</div>
                <div class="key" data-key="d">D</div>
            </div>
        </div>

        <p class="hint">Нажми <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> на клавиатуре 😉</p>

        <div class="social-links">

        </div>

</body>
